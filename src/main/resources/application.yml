spring:
  application:
    name: mental-app-backend

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: ${DB_DRIVER}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: true

  sql:
    init:
      mode: never

  google:
    client-id: ${GOOGLE_CLIENT_ID}

  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}
